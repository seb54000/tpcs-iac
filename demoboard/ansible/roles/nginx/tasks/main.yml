---
- name: Install frontend build and runtime packages
  ansible.builtin.apt:
    name:
      - nginx
      - nodejs
      - npm
      - rsync
    state: present
    update_cache: true

- name: Ensure demoboard group exists for frontend
  ansible.builtin.group:
    name: "{{ app_group }}"
    state: present

- name: Ensure demoboard user exists for frontend
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ app_root }}"
    create_home: false

- name: Ensure frontend directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(app_user) }}"
    group: "{{ item.group | default(app_group) }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ app_root }}", mode: "0755" }
    - { path: "{{ app_root }}/frontend-service", mode: "0755" }
    - { path: "{{ app_front_root }}", owner: "www-data", group: "www-data", mode: "0755" }

- name: Synchronize frontend source tree
  ansible.posix.synchronize:
    src: "{{ demoboard_project_src }}/frontend-service/"
    dest: "{{ app_root }}/frontend-service/"
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=dist"
  notify: Build and install frontend

- name: Ensure frontend source ownership
  ansible.builtin.file:
    path: "{{ app_root }}/frontend-service"
    state: directory
    recurse: true
    owner: "{{ app_user }}"
    group: "{{ app_group }}"

- name: Install frontend npm dependencies
  become_user: "{{ app_user }}"
  ansible.builtin.command:
    cmd: npm ci
    chdir: "{{ app_root }}/frontend-service"
  notify: Build and install frontend

- name: Render nginx site for demoboard
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-enabled/default
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Flush frontend handlers immediately
  ansible.builtin.meta: flush_handlers

- name: Ensure nginx is enabled and started
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started

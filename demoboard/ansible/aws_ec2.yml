
# https://docs.ansible.com/ansible/latest/collections/amazon/aws/aws_ec2_inventory.html


plugin: amazon.aws.aws_ec2
hostvars_prefix: aws_
regions:
  - eu-west-3
# filters:
#   # All instances with their `Environment` tag set to `dev`
#   tag:Environment: dev
#   # All dev and QA hosts
#   tag:Environment:
#     - dev
#     - qa
